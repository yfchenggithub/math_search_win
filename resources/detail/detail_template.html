<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Conclusion Detail</title>

  <link rel="stylesheet" href="../katex/katex.min.css" />
  <link rel="stylesheet" href="./detail.css" />

  <script>
    window.__DETAIL_INITIAL_DATA__ = __DETAIL_PAYLOAD__;
  </script>
  <script defer src="../katex/katex.min.js"></script>
  <script defer src="../katex/contrib/auto-render.min.js"></script>
  <script defer src="./detail.js"></script>
</head>
<body>
  <div id="detailPage" class="detail-page">
    <main class="detail-page-shell">
      <div class="detail-page-scroll">
        <article class="detail-page-article">

          <section id="detailEmptyState" class="detail-state detail-state-empty" hidden>
            <div class="detail-state-title">请选择一个结论</div>
            <div id="detailEmptyText" class="detail-state-text">在左侧结果列表中点击一条结论，这里会显示详细内容。</div>
          </section>

          <section id="detailErrorState" class="detail-state detail-state-error" hidden>
            <div class="detail-state-title">详情暂时无法显示</div>
            <div id="detailErrorText" class="detail-state-text"></div>
          </section>

          <section id="detailContent" class="detail-page-content" hidden>
            <header class="detail-header">
              <div class="detail-header-main">
                <h1 id="detailTitle" class="detail-header-title"></h1>
                <div class="detail-header-subtitle">
                  <span id="detailConclusionId" class="detail-meta-item detail-meta-id"></span>
                  <span id="detailModule" class="detail-meta-item detail-meta-module"></span>
                </div>
              </div>

              <div id="detailTags" class="detail-tag-list"></div>
            </header>

            <section id="detailSummaryBlock" class="detail-summary-block" hidden>
              <div class="detail-summary-text" id="detailSummaryText"></div>
            </section>

            <div id="detailSections" class="detail-sections"></div>
          </section>

        </article>
      </div>
    </main>
  </div>
</body>
</html>
